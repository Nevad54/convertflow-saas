{% extends "base.html" %}
{% block title %}Sign in — ConvertFlow{% endblock %}
{% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <div class="auth-card__header">
      <h1>Sign in</h1>
      <p>Welcome back. Continue where you left off.</p>
    </div>

    {% if error %}
    <div class="auth-card__error" role="alert">{{ error }}</div>
    {% endif %}

    <form class="auth-form" method="post" action="/auth/login">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          required
          placeholder="you@example.com"
        >
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          placeholder="••••••••"
        >
      </div>
      <button type="submit" class="btn btn--primary btn--full">Sign in</button>
    </form>

    <p class="auth-card__switch">
      No account yet? <a href="/auth/signup">Create one — it's free</a>
    </p>
  </div>
</section>
{% endblock %}
